<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéTracker | Master the Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Changa+One&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* THE THEME ENGINE */
        :root {
            --pokedex-red: #E3350D; --pokedex-dark: #8B0000;
            --pokemon-yellow: #FFCC00; --pokemon-blue: #3B4CCA;
            --bg-deep: #0a0a1a; --text-main: #f3f3f3; --text-muted: #b0b0c0;
            --glass-bg: rgba(15, 20, 40, 0.8); --glass-border: var(--pokemon-blue);
            --modal-bg: var(--bg-deep);
            --bg-image: linear-gradient(to bottom, rgba(10, 10, 26, 0.8), rgba(10, 10, 26, 0.95)), url('https://image.tmdb.org/t/p/original/rOuGm07PxAhjKqlkfcFMNOcsboV.jpg');
        }

        body.light-mode {
            --pokedex-red: #E3350D; --pokedex-dark: #CC0000;
            --pokemon-yellow: #FFB300; --pokemon-blue: #2a3b96;
            --bg-deep: #f0f4f8; --text-main: #1a1a2e; --text-muted: #4a4a6a;
            --glass-bg: rgba(255, 255, 255, 0.85); --glass-border: rgba(59, 76, 202, 0.3);
            --modal-bg: #ffffff;
            --bg-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.9)), url('https://image.tmdb.org/t/p/original/7kMvXENt8T0A0pWab2nB2gq8s3z.jpg');
        }
        
        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; 
            color: var(--text-main); background-color: var(--bg-deep);
            background-image: var(--bg-image);
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 0.5s ease, background-color 0.5s ease, color 0.5s ease;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; 
            background: linear-gradient(90deg, var(--pokedex-dark), var(--pokedex-red));
            border-bottom: 4px solid var(--pokemon-yellow); box-shadow: 0 4px 15px rgba(227, 53, 13, 0.5);
        }
        .logo { font-family: 'Changa One', sans-serif; font-size: 32px; color: var(--pokemon-yellow); text-shadow: 2px 2px 0px var(--pokemon-blue); margin: 0;}
        
        .theme-btn {
            background: var(--bg-deep); color: var(--text-main);
            border: 2px solid var(--pokemon-yellow); padding: 8px 16px; border-radius: 20px;
            font-family: 'Poppins', sans-serif; font-weight: 800; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .theme-btn:hover { transform: scale(1.05); }

        .hero { text-align: center; padding: 40px 20px 20px 20px; }
        .hero h1 { font-family: 'Changa One', sans-serif; font-size: 54px; margin-bottom: 5px; color: var(--text-main); letter-spacing: 1px; transition: 0.3s;}
        .hero p { color: var(--pokemon-blue); font-size: 18px; max-width: 600px; margin: 0 auto; font-weight: 800; text-shadow: 0px 1px 2px rgba(255,255,255,0.5);}
        body:not(.light-mode) .hero p { color: var(--pokemon-yellow); text-shadow: none; }
        
        .continue-banner {
            display: none; width: 90%; max-width: 1000px; margin: 20px auto 40px auto;
            background: var(--glass-bg); border: 2px solid var(--pokemon-yellow);
            border-radius: 16px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0, 0.2);
            backdrop-filter: blur(10px); gap: 25px; align-items: center; transition: 0.3s;
        }
        .continue-img { width: 250px; height: 140px; object-fit: cover; border-radius: 8px; border: 2px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .continue-info { flex: 1; }
        .continue-tag { color: #00FF7F; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px;}
        body.light-mode .continue-tag { color: #00b359; }
        .continue-title { font-size: 24px; font-weight: 800; margin: 0 0 10px 0; color: var(--text-main);}
        .continue-desc { font-size: 13px; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 15px;}
        .resume-btn { background: var(--pokemon-blue); color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 800; font-family: 'Poppins', sans-serif; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(59, 76, 202, 0.4); }
        .resume-btn:hover { background: #4b5df0; transform: translateY(-2px); }
